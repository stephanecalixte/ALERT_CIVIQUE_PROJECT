# Configuration de test - Base de données H2 en mémoire
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Logging configuration for tests
logging.level.root=WARN
logging.level.com.enterprise.alert_civique=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN

# JWT Configuration
jws.secret=MySecretKeyForTestingPurposeOnly1234567890ABCDEFGHIJKLMNOPQRSTUVWXYZ

# Application configuration
spring.application.name=alert_civique_test

# Disable unnecessary features for testing
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

# Mail configuration - disabled for tests
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=test
spring.mail.password=test

# H2 Console
spring.h2.console.enabled=true
