# Configuration de l'application
spring.application.name=alert_civique
server.port=9090

# ===============================
# DATASOURCE — MariaDB
# ===============================
spring.datasource.url=${DB_URL:jdbc:mariadb://localhost:3307/alertdb?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Europe/Paris}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.show-sql=true
spring.jpa.generate-ddl=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# SQL INIT
# ===============================
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ===============================
# H2 CONSOLE (désactivé en prod MariaDB)
# ===============================
spring.h2.console.enabled=false

# ===============================
# MONGODB CONFIGURATION
# ===============================
spring.mongodb.host=${MONGODB_HOST:localhost}
spring.mongodb.port=${MONGODB_PORT:27017}
spring.mongodb.database=${MONGODB_DATABASE:alertdb}
spring.data.mongodb.auto-index-creation=true
spring.data.mongodb.repositories.enabled=true

# ===============================
# LOGGING
# ===============================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.boot.autoconfigure=INFO
logging.level.org.springframework.data.mongodb=DEBUG
logging.level.com.mongodb=DEBUG
logging.level.root=INFO
logging.file.path=logs
logging.file.name=alert_civique.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n

# ===============================
# UPLOADS VIDÉO LIVESTREAM
# ===============================
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
spring.web.resources.static-locations=classpath:/static/,file:src/main/resources/static/uploads/

# ===============================
# APPLICATION INITIALIZATION
# ===============================
# SECURITY: Admin initial password must be set via environment variable
# Set via: export ADMIN_PASSWORD=<secure-password>
app.init.admin-password=${ADMIN_PASSWORD:admin}

# ===============================
# JWT CONFIGURATION
# ===============================
# SECURITY: Use environment variables for secrets
# Set via: export JWS_SECRET=<your-secret>, export JWT_SECRET=<your-secret>, etc.
jws.secret=${JWS_SECRET}
jwt.secret=${JWT_SECRET}
app.jwt.activation-secret=${JWT_ACTIVATION_SECRET}
app.jwt.activation-expiration-ms=86400000

# ===============================
# MAIL CONFIGURATION
# ===============================
# SECURITY: Mail credentials must be set via environment variables
# Set via: export MAIL_USERNAME=<your-email>, export MAIL_PASSWORD=<your-app-password>
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
