# Configuration de l'application
spring.application.name=alert_civique
server.port=9090

# ===============================
# JPA / HIBERNATE (DEV H2)
# ===============================
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

# ===============================
# SQL INIT
# ===============================
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=true
spring.jpa.generate-ddl=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# MONGODB CONFIGURATION
# ===============================
spring.mongodb.host=localhost
spring.mongodb.port=27017
spring.mongodb.database=alertdb

# Options supplémentaires (optionnelles)
spring.data.mongodb.auto-index-creation=true
spring.data.mongodb.repositories.enabled=true

# ===============================
# LOGGING
# ===============================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.boot.autoconfigure=INFO
logging.level.org.springframework.data.mongodb=DEBUG
logging.level.com.mongodb=DEBUG

# ===============================
# UPLOADS VIDÉO LIVESTREAM
# ===============================
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
spring.web.resources.static-locations=classpath:/static/,file:src/main/resources/static/uploads/
