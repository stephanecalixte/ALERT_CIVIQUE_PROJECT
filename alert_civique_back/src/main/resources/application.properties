# Configuration de l'application
spring.application.name=alert_civique
server.port=9090
# Écouter sur toutes les interfaces réseau (nécessaire pour accès depuis téléphone mobile)
server.address=0.0.0.0

# ===============================
# DATASOURCE — MySQL
# ===============================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/alertdb?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Europe/Paris}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.generate-ddl=false
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# SQL INIT
# ===============================
spring.sql.init.mode=always
spring.sql.init.continue-on-error=false
spring.jpa.defer-datasource-initialization=false

# ===============================
# H2 CONSOLE (désactivé en prod MariaDB)
# ===============================
spring.h2.console.enabled=false

# ===============================
# MONGODB — désactivé (non utilisé en production)
# ===============================
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.mongo.MongoRepositoriesAutoConfiguration

# ===============================
# LOGGING
# ===============================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.boot.autoconfigure=INFO
logging.level.org.springframework.data.mongodb=DEBUG
logging.level.com.mongodb=DEBUG
logging.level.root=INFO
logging.file.path=logs
logging.file.name=alert_civique.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n

# ===============================
# JACKSON
# ===============================
# spring.jackson.time-zone=UTC

# ===============================
# NODE.JS MEDIA SERVER
# ===============================
node.media.base-url=${NODE_MEDIA_URL:http://localhost:9091}

# ===============================
# UPLOADS VIDÉO LIVESTREAM
# ===============================
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
spring.web.resources.static-locations=classpath:/static/,file:src/main/resources/static/uploads/

# ===============================
# APPLICATION INITIALIZATION
# ===============================
# SECURITY: Admin initial password must be set via environment variable
# Set via: export ADMIN_PASSWORD=<secure-password>
app.init.admin-password=${ADMIN_PASSWORD:admin}

# ===============================
# JWT CONFIGURATION
# ===============================
# SECURITY: Use environment variables for secrets
# Set via: export JWS_SECRET=<your-secret>, export JWT_SECRET=<your-secret>, etc.
jws.secret=${JWS_SECRET:alertcivique-dev-jws-secret-key-must-be-32chars}
jwt.secret=${JWT_SECRET:alertcivique-dev-jwt-secret-key-must-be-32chars}
app.jwt.activation-secret=${JWT_ACTIVATION_SECRET:alertcivique-dev-activation-key-32chars}
app.jwt.activation-expiration-ms=86400000

# ===============================
# MAIL CONFIGURATION
# ===============================
# SECURITY: Mail credentials must be set via environment variables
# Set via: export MAIL_USERNAME=<your-email>, export MAIL_PASSWORD=<your-app-password>
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:noreply@localhost}
spring.mail.password=${MAIL_PASSWORD:changeme}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
