# Test profile - Override JWT secrets with environment variables
# For testing, provide these via environment or use defaults
app.jwt.activation-secret=${JWT_ACTIVATION_SECRET:VGVzdEFjdGl2YXRpb25TZWNyZXRLZXkyMDI0}
app.jwt.secret=${JWT_SECRET:VGVzdFNlY3JldEtleTIwMjQ=}

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
