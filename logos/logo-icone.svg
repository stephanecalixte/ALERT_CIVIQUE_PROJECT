<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="shieldGrad" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%"   stop-color="#1A8FFF"/>
      <stop offset="100%" stop-color="#0044CC"/>
    </linearGradient>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#003399" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Bouclier -->
  <path d="M50 6
           C50 6 78 16 82 20
           L82 52
           Q82 80 50 95
           Q18 80 18 52
           L18 20
           C22 16 50 6 50 6 Z"
        fill="url(#shieldGrad)"
        filter="url(#softShadow)"/>

  <!-- Reflet haut (style Apple) -->
  <path d="M50 8 C50 8 72 17 76 21 L76 36
           Q60 30 50 28 Q40 30 24 36 L24 21
           C28 17 50 8 50 8 Z"
        fill="white" opacity="0.10"/>

  <!-- Main blanche -->
  <g transform="translate(50,58)">
    <rect x="-13" y="0"   width="26"  height="20"  rx="7"   fill="white" opacity="0.97"/>
    <rect x="-13" y="-22" width="6"   height="24"  rx="3"   fill="white" opacity="0.97"/>
    <rect x="-6"  y="-27" width="6"   height="29"  rx="3"   fill="white" opacity="0.97"/>
    <rect x="1"   y="-26" width="6"   height="28"  rx="3"   fill="white" opacity="0.97"/>
    <rect x="8"   y="-20" width="6"   height="22"  rx="3"   fill="white" opacity="0.97"/>
    <rect x="-21" y="-6"  width="9"   height="14"  rx="4.5" fill="white" opacity="0.97"/>
  </g>

  <!-- Signal orange -->
  <g transform="translate(50,32)">
    <path d="M-18 0 Q0 -13 18 0" fill="none" stroke="#FF6600" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M-12 0 Q0 -8  12 0" fill="none" stroke="#FF8833" stroke-width="2.5" stroke-linecap="round" opacity="0.75"/>
    <path d="M-6  0 Q0 -4  6  0" fill="none" stroke="#FFAA66" stroke-width="2"   stroke-linecap="round" opacity="0.5"/>
    <circle cx="0" cy="1.5" r="3" fill="#FF6600"/>
  </g>
</svg>
