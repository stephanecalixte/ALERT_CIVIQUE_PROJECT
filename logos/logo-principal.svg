<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 110" width="100" height="110">
  <defs>
    <linearGradient id="shieldG" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%"   stop-color="#1A8FFF"/>
      <stop offset="100%" stop-color="#0044CC"/>
    </linearGradient>
    <linearGradient id="orangeG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FF6600"/>
      <stop offset="100%" stop-color="#FF9933"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#003399" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Bouclier -->
  <path d="M50 4
           C50 4 82 15 86 20
           L86 54
           Q86 82 50 98
           Q14 82 14 54
           L14 20
           C18 15 50 4 50 4 Z"
        fill="url(#shieldG)" filter="url(#sh)"/>

  <!-- Reflet Apple -->
  <path d="M50 6 C50 6 78 16 82 21 L82 36
           Q66 30 50 28 Q34 30 18 36 L18 21
           C22 16 50 6 50 6 Z"
        fill="white" opacity="0.10"/>

  <!-- Main blanche -->
  <g transform="translate(50,62)">
    <rect x="-14" y="0"   width="28"  height="22"  rx="7"   fill="white" opacity="0.97"/>
    <rect x="-14" y="-24" width="6.5" height="26"  rx="3.2" fill="white" opacity="0.97"/>
    <rect x="-6"  y="-30" width="6.5" height="32"  rx="3.2" fill="white" opacity="0.97"/>
    <rect x="2"   y="-29" width="6.5" height="31"  rx="3.2" fill="white" opacity="0.97"/>
    <rect x="10"  y="-23" width="6.5" height="25"  rx="3.2" fill="white" opacity="0.97"/>
    <rect x="-22" y="-7"  width="9"   height="16"  rx="4.5" fill="white" opacity="0.97"/>
  </g>

  <!-- Signal orange -->
  <g transform="translate(50,34)">
    <path d="M-19 0 Q0 -14 19 0" fill="none" stroke="#FF6600" stroke-width="3.8" stroke-linecap="round"/>
    <path d="M-12 0 Q0 -9  12 0" fill="none" stroke="#FF8833" stroke-width="2.6" stroke-linecap="round" opacity="0.72"/>
    <path d="M-6  0 Q0 -4.5 6 0" fill="none" stroke="#FFAA66" stroke-width="2"   stroke-linecap="round" opacity="0.45"/>
    <circle cx="0" cy="2" r="3.2" fill="#FF6600"/>
  </g>
</svg>
