<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 180" width="800" height="180">
  <defs>
    <linearGradient id="bgG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#07162B"/>
      <stop offset="100%" stop-color="#0B2040"/>
    </linearGradient>
    <linearGradient id="shG" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%"   stop-color="#1A8FFF"/>
      <stop offset="100%" stop-color="#0044CC"/>
    </linearGradient>
    <linearGradient id="orG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FF6600"/>
      <stop offset="100%" stop-color="#FF9933"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shShadow">
      <feDropShadow dx="0" dy="5" stdDeviation="10" flood-color="#0033AA" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Fond -->
  <rect width="800" height="180" rx="22" fill="url(#bgG)"/>

  <!-- Cercles décoratifs -->
  <circle cx="400" cy="90" r="160" fill="none" stroke="#0066CC" stroke-width="0.5" opacity="0.10"/>
  <circle cx="400" cy="90" r="110" fill="none" stroke="#0066CC" stroke-width="0.5" opacity="0.07"/>

  <!-- BOUCLIER CENTRÉ GRAND -->
  <g transform="translate(330,10)" filter="url(#shShadow)">
    <path d="M70 2
             C70 2 118 18 122 26
             L122 76
             Q122 116 70 134
             Q18 116 18 76
             L18 26
             C22 18 70 2 70 2 Z"
          fill="url(#shG)"/>

    <!-- Reflet -->
    <path d="M70 5 C70 5 114 20 118 27 L118 48
             Q94 40 70 38 Q46 40 22 48 L22 27
             C26 20 70 5 70 5 Z"
          fill="white" opacity="0.08"/>

    <!-- Main blanche -->
    <g transform="translate(70,88)">
      <rect x="-20" y="0"   width="40"  height="30"  rx="10"  fill="white" opacity="0.97"/>
      <rect x="-20" y="-34" width="9"   height="36"  rx="4.5" fill="white" opacity="0.97"/>
      <rect x="-9"  y="-42" width="9"   height="44"  rx="4.5" fill="white" opacity="0.97"/>
      <rect x="2"   y="-40" width="9"   height="42"  rx="4.5" fill="white" opacity="0.97"/>
      <rect x="13"  y="-32" width="9"   height="34"  rx="4.5" fill="white" opacity="0.97"/>
      <rect x="-31" y="-10" width="12"  height="22"  rx="6"   fill="white" opacity="0.97"/>
    </g>

    <!-- Signal orange -->
    <g transform="translate(70,48)" filter="url(#glow)">
      <path d="M-28 0 Q0 -20 28 0" fill="none" stroke="#FF6600" stroke-width="5"   stroke-linecap="round"/>
      <path d="M-18 0 Q0 -13 18 0" fill="none" stroke="#FF8833" stroke-width="3.5" stroke-linecap="round" opacity="0.7"/>
      <path d="M-9  0 Q0 -6.5 9 0" fill="none" stroke="#FFAA66" stroke-width="2.5" stroke-linecap="round" opacity="0.45"/>
      <circle cx="0" cy="2.5" r="5" fill="#FF6600"/>
    </g>
  </g>
</svg>
